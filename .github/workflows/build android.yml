name: Build KOReader Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [android-arm, android-arm64]
      fail-fast: false

    name: Build ${{ matrix.target }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake build-essential ca-certificates cmake \
            gcc-multilib gettext git libtool libtool-bin nasm \
            ninja-build patch perl pkg-config unzip wget \
            openjdk-17-jdk-headless p7zip-full python3-pip
          # 升级 pip 后安装 meson
          python3 -m pip install --upgrade pip
          python3 -m pip install meson
          meson --version

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 设置 Android 环境
        uses: android-actions/setup-android@v3

      - name: 安装 NDK r23c 及 Android SDK 组件
        run: |
          sdkmanager "ndk;23.2.8568313" "platforms;android-28" "build-tools;28.0.3"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/23.2.8568313" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/23.2.8568313" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/ndk/23.2.8568313/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: 验证工具链
        run: |
          aarch64-linux-android21-clang --version
          armv7a-linux-androideabi21-clang --version

      - name: 缓存 ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.target }}-

      - name: 拉取第三方依赖
        run: ./kodev fetch-thirdparty

      - name: 构建 ${{ matrix.target }}
        run: ./kodev release ${{ matrix.target }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: koreader-${{ matrix.target }}-${{ github.run_number }}
          path: |
            *.apk
            koreader-android-*.zip
          if-no-files-found: warn
          retention-days: 30
